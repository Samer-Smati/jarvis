<div class="brain-graph-panel">
  <header class="graph-header">
    <div class="title-block">
      <span class="graph-title">Graph view</span>
      <span class="stats" *ngIf="nodeCount">{{ nodeCount }} notes · {{ edgeCount }} links</span>
    </div>
    <div class="header-actions">
      <button type="button" class="icon-btn" (click)="refresh()" title="Refresh">
        <i class="pi pi-refresh" [class.pi-spin]="loading"></i>
      </button>
      <button type="button" class="icon-btn" (click)="close()" title="Close">
        <i class="pi pi-times"></i>
      </button>
    </div>
  </header>

  <div
    class="graph-body"
    #canvas
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp()"
    (pointerleave)="onPointerUp()"
    (click)="clearSelection()">
    <p *ngIf="loading" class="graph-status">Loading graph…</p>
    <p *ngIf="error && !loading" class="graph-status error">{{ error }}</p>

    <svg
      *ngIf="!loading && layoutNodes.length"
      class="graph-svg"
      [attr.viewBox]="'0 0 ' + width + ' ' + height"
      preserveAspectRatio="xMidYMid meet">
      <g class="edges">
        <line
          *ngFor="let edge of edges"
          [attr.x1]="nodeCoord(edge.source)?.x"
          [attr.y1]="nodeCoord(edge.source)?.y"
          [attr.x2]="nodeCoord(edge.target)?.x"
          [attr.y2]="nodeCoord(edge.target)?.y"
          class="edge-line"
          [class.highlight]="isEdgeHighlighted(edge)"
          [class.dimmed]="isEdgeDimmed(edge)" />
      </g>
      <g class="nodes">
        <g
          *ngFor="let node of layoutNodes"
          class="node-group"
          [class.dimmed]="isNodeDimmed(node)"
          [class.selected]="selectedId === node.id"
          (pointerdown)="onPointerDown($event, node)">
          <circle
            [attr.cx]="node.x"
            [attr.cy]="node.y"
            [attr.r]="nodeRadius(node)"
            [attr.fill]="nodeFill(node)"
            class="node-circle" />
          <text
            [attr.x]="node.x"
            [attr.y]="node.y + labelOffset(node)"
            class="node-label"
            text-anchor="middle">
            {{ node.label }}
          </text>
        </g>
      </g>
    </svg>

    <div class="legend-float" *ngIf="layoutNodes.length && !loading">
      <span class="legend-dot" style="--dot-color: #b4a7d6">Concept</span>
      <span class="legend-dot" style="--dot-color: #a78bfa">Entity</span>
      <span class="legend-dot" style="--dot-color: #7a7a7a">Other</span>
    </div>
  </div>
</div>
